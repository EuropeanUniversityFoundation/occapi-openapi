      description: "**Mode of learning and assessment** as defined in the European Learning\n  Model (ELM).\n\n**Usage**\n\n- `e92d221e4d` represents\t_Blended_\n- `c_3a90b26d` represents\t_Hybrid_\n- `920fbb3cbe` represents\t_Online_\n- `9191af2ed9` represents\t_Presential_\n- `7813801c77` represents\t_Project based_\n- `ed4c557045` represents\t_Research-Lab based_\n- `729f3bed4b` represents\t_Workbased_\n\n**References**\n\n[Mode of learning and assessment - EU Vocabularies](https://op.europa.eu/en/web/eu-vocabularies/concept-scheme/-/resource?uri=http://data.europa.eu/snb/learning-assessment/25831c2)\n"
