    AcademicTermId:
      type: string
      description: |
        The academic term ID, as defined by [Erasmus Without Paper](#),
         combines the exact academic year with the (generic) academic term as seen
         at the Course level.

        **Usage**

        - The exact academic year component is described as `yearStart/yearEnd`;
        - Wherever the academic year begins and ends in different calendar years,
         the values of `yearStart` and `yearEnd` will be consecutive: `2025/2026`;
        - Wherever the academic year begins and ends in the same calendar year,
         the values of `yearStart` and `yearEnd` will be the same: `2026/2026`;
        - The (generic) academic term component is taken from the [Course]();
        - The resulting format is `YYYY/YYYY-t/T` i.e. `2025/2026-1/2` means the
         **first** (1) **semester** (2) of the academic year **2025/2026**.
