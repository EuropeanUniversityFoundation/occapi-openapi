          in: path
          description: The SCHAC code of the Institution.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          headers:
            X-Rate-Limit:
              description: calls per hour allowed by the user.
              schema:
                type: integer
                format: int32
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/CourseCollection'
              example:
                jsonapi:
                  version: '1.1'
                  meta:
                    links:
                      self:
                        href: http://jsonapi.org/format/1.1/
                data:
                  - type: course
                    id: aabbccdd-eeff-1122-3344-556677889900
                    attributes:
                      title:
                        - string: Example Course
                          lang: en
                      code: COUR01
                      description:
                        - multiline: |
                            This is the description of the Course.

                            This is a long text field.
                          lang: en
                      learningOutcomes:
                        - multiline: |
                            These are the learning outcomes of the Course.

                            This is a long text field.
                          lang: en
                      academicTerm: 1/2
                      ects: 6
                      languageOfInstruction: en
                      iscedCode: '0000'
                      subjectArea: '00.0'
                      otherCategorization: zero
                      unavailableForIncomingMobility: false
                      url:
                        - uri: www.domain.tld/example/course
                          lang: en
                    meta:
                      global:
                        eqfLevel: 6
                        year: 1/3
                      programme:
                        - programmeId: abcdef12-3456-7890-abcd-ef1234567890
                          mandatoryCourse: true
                          year: 1/2
                    links:
                      self:
                        href: http://example.com/occapi/v1/hei/domain.tld/course/aabbccdd-eeff-1122-3344-556677889900
