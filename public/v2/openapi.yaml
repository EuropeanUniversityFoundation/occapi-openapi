                    $ref: '#/components/schemas/ElmAssessmentType'
                  elmLearningActivityType:
                    $ref: '#/components/schemas/ElmLearningActivityType'
                  elmLearningOpportunityType:
                    $ref: '#/components/schemas/ElmLearningOpportunityTypeCourse'
                  elmModeOfLearning:
                    $ref: '#/components/schemas/ElmModeOfLearningAndAssessment'
