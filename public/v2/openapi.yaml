    ProgrammeLength:
      type: string
      pattern: ^\d{1,2}\/\d$
      description: |
        Length of the Programme in **number of academic terms**.

        The first numeric component matching `\d{1,2}` indicates the total
          number of academic terms, while the second component matching `\d`
          indicates the fraction of a full academic year corresponding to a
          single academic term.

        **Usage**

        - `6/2` indicates six (6) semesters (1/2) equivalent to three full
          academic years;
        - `7/2` indicates seven (7) semesters (1/2) equivalent to three and a
          half academic years;
        - `9/3` indicates nine (9) trimesters (1/3) equivalent to three full
          academic years;
        - `3/1` indicates three (3) full years (1/1) absent a division in terms.
