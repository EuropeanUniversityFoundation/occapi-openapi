                  ects:
                    type: integer
                    minimum: 0
                    description: |
                      Number of ECTS credits awarded to the learner upon completing the Course.
                  academicTerm:
                    type: array
                    description: |
                      Academic term in which the Course is delivered.

                      Multiple values are allowed in order to support Courses delivered in
                        in more than one academic term throughout an academic year.

