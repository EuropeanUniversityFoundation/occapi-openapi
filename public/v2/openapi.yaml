openapi: 3.1.0
info:
  version: 2.0.0-dev
  title: Open Course Catalogue API
  termsOfService: ''
  contact:
    email: api.support@uni-foundation.eu
    url: https://github.com/EuropeanUniversityFoundation/occapi-openapi
  x-logo:
    url: https://uni-foundation.eu/wp-content/uploads/2019/04/EUF-1.png
  description: |
    # Current status

    This version (`v2@dev`) of the OCCAPI specification is a **work in progress** and reflects the discussions within the community, which are documented in the [GitHub issue queue](https://github.com/EuropeanUniversityFoundation/occapi-openapi/issues).
servers:
  - url: /occapi/v2
    description: Sandbox server (example data)
tags:
  - name: API server
    description: Information about the server.
  - name: Institution
    description: Information about the Institutions covered by the server.
  - name: Organisational Unit
    description: Information about Organisational Units in an Institution.
  - name: Programme
    description: Information about Programmes offered by an Institution.
  - name: Course
    description: |
      Information about Courses offered by an Institution.

      _Course_ resources include a JSON:API _meta_ object containing information
       about the relation between each Course and all or specific Programmes.
paths:
  /:
    get:
      tags:
        - API server
      summary: GET /
      description: Get server information and primary Hypermedia links.
      operationId: getRoot
      responses:
        '200':
          description: OK
          headers:
            X-Rate-Limit:
              description: calls per hour allowed by the user.
              schema:
                type: integer
                format: int32
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/Root'
              example:
                jsonapi:
                  version: '1.1'
                  meta:
                    links:
                      self:
                        href: http://jsonapi.org/format/1.1/
                meta: {}
                links:
                  self:
                    href: http://example.com/occapi/v1
                  hei:
                    href: http://example.com/occapi/v1/hei
        '404':
          description: Endpoint not available.
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                jsonapi:
                  version: '1.1'
                  meta:
                    links:
                      self:
                        href: http://jsonapi.org/format/1.1/
                errors:
                  - status: '404'
                    title: Endpoint not available.
  /hei:
    get:
      tags:
        - Institution
      summary: GET /hei
      description: |
        This endpoint lists all _Institutions_ covered by this server.

        In order to obtain more detailed and up to date information about an
         Institution, it is **recommended** that client implementations use the
         [HEI API](https://hei.api.uni-foundation.eu) service provided by the
         [European University Foundation](https://uni-foundation.eu/).
      operationId: getInstitutions
      responses:
        '200':
          description: OK
          headers:
            X-Rate-Limit:
              description: calls per hour allowed by the user.
              schema:
                type: integer
                format: int32
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/InstitutionCollection'
              example:
                jsonapi:
                  version: '1.1'
                  meta:
                    links:
                      self:
                        href: http://jsonapi.org/format/1.1/
                data:
                  - type: hei
                    id: 12345678-90ab-cdef-1234-567890abcdef
                    attributes:
                      title:
                        - string: Example Institution
                          lang: en
                      abbreviation: EI
                      heiId: domain.tld
                      url:
                        - uri: www.domain.tld
                          lang: en
                    links:
                      self:
                        href: http://example.com/occapi/v1/hei/domain.tld
                links:
                  self:
                    href: http://example.com/occapi/v1/hei
        '404':
          description: Endpoint not available.
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                jsonapi:
                  version: '1.1'
                  meta:
                    links:
                      self:
                        href: http://jsonapi.org/format/1.1/
                errors:
                  - status: '404'
                    title: Endpoint not available.
  /hei/{heiId}:
    get:
      tags:
        - Institution
      summary: GET /hei/{heiId}
      description: |
        This endpoint exposes some basic information about an Institution covered by
         the server, which should be sufficient to satisfy basic UX/UI needs of
         app developers.

        In order to obtain more detailed and up to date information about an
         Institution, it is **recommended** that client implementations use the
         [HEI API](https://hei.api.uni-foundation.eu) service provided by the
         [European University Foundation](https://uni-foundation.eu/).
      operationId: getInstitutionById
      parameters:
        - name: heiId
          in: path
          description: The SCHAC code of the Institution.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          headers:
            X-Rate-Limit:
              description: calls per hour allowed by the user.
              schema:
                type: integer
                format: int32
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/InstitutionResource'
              example:
                jsonapi:
                  version: '1.1'
                  meta:
                    links:
                      self:
                        href: http://jsonapi.org/format/1.1/
                data:
                  type: hei
                  id: 12345678-90ab-cdef-1234-567890abcdef
                  attributes:
                    title:
                      - string: Example Institution
                        lang: en
                    abbreviation: EI
                    heiId: domain.tld
                    url:
                      - uri: www.domain.tld
                        lang: en
                  links:
                    self:
                      href: http://example.com/occapi/v1/hei/domain.tld
                links:
                  self:
                    href: http://example.com/occapi/v1/hei/domain.tld
                  ounit:
                    href: http://example.com/occapi/v1/hei/domain.tld/ounit
                  programme:
                    href: http://example.com/occapi/v1/hei/domain.tld/programme
                  course:
                    href: http://example.com/occapi/v1/hei/domain.tld/course
        '404':
          description: Resource not found.
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                jsonapi:
                  version: '1.1'
                  meta:
                    links:
                      self:
                        href: http://jsonapi.org/format/1.1/
                errors:
                  - status: '404'
                    title: Resource not found.
  /hei/{heiId}/ounit:
    get:
      tags:
        - Organisational Unit
      summary: GET /hei/{heiId}/ounit
      description: |
        This endpoint lists all _Organisational Units_ in an _Institution_.

        Implementation is optional but **recommended** since exposing collections by
         _Organisational Unit_ can help avoid large HTTP responses.
      operationId: getOunits
      parameters:
        - name: heiId
          in: path
          description: The SCHAC code of the Institution.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          headers:
            X-Rate-Limit:
              description: calls per hour allowed by the user.
              schema:
                type: integer
                format: int32
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/OunitCollection'
              example:
                jsonapi:
                  version: '1.1'
                  meta:
                    links:
                      self:
                        href: http://jsonapi.org/format/1.1/
                data:
                  - type: ounit
                    id: 11223344-5566-7788-9900-aabbccddeeff
                    attributes:
                      title:
                        - string: Example Organisational Unit
                          lang: en
                      abbreviation: EOU
                      ounitId: 11223344-5566-7788-9900-aabbccddeeff
                      ounitCode: EI-EOU
                      url:
                        - uri: www.domain.tld/eou
                          lang: en
                    links:
                      self:
                        href: http://example.com/occapi/v1/hei/domain.tld/ounit/11223344-5566-7788-9900-aabbccddeeff
                links:
                  self:
                    href: http://example.com/occapi/v1/hei/domain.tld/ounit
        '404':
          description: Endpoint not available.
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                jsonapi:
                  version: '1.1'
                  meta:
                    links:
                      self:
                        href: http://jsonapi.org/format/1.1/
                errors:
                  - status: '404'
                    title: Endpoint not available.
