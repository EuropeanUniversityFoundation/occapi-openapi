openapi: 3.1.0
info:
  version: 2.0.0-beta
  title: Open Course Catalogue API
  termsOfService: ''
  contact:
    email: api.support@uni-foundation.eu
    url: https://github.com/EuropeanUniversityFoundation/occapi-openapi
  x-logo:
    url: https://uni-foundation.eu/wp-content/uploads/2019/04/EUF-1.png
  description: |
    # MARCH 2026 UPDATE

    With this version (`v2@beta`) of the OCCAPI specification, **the data model will now remain unchanged**.

    In terms of functionality, this specification is a **work in progress** and reflects the discussions within the community, which are documented in the [GitHub issue queue](https://github.com/EuropeanUniversityFoundation/occapi-openapi/issues).

    # Introduction

    The **Open Course Catalogue API (OCCAPI)** specification aims to standardize the way in which Higher Education Institutions expose their course catalogues in a machine-readable format.

    By facilitating access to their course catalogues, Institutions can allow consumer applications to implement user friendly ways for prospective students to explore course offers.

    ## Overview

    OCCAPI places an emphasis on exposing curricular structure and adopting existing classification standards, such as the **European Qualifications Framework (EQF)** and the **International Standard Classification for Education (ISCED)**. OCCAPI v2 is also aligned with the **European Learning Model (ELM)**, in particular at the level of controlled vocabularies.

    The OCCAPI specification was originally inspired by the [Erasmus Without Paper](https://www.erasmuswithoutpaper.eu/) API specifications and attempts to follow most of its conventions. However, this API specification differs from other EWP APIs by adopting the [JSON:API](https://jsonapi.org/) format following industry trends.

    In June 2025 it was decided that OCCAPI would become an [Erasmus Without Paper](https://developers.erasmuswithoutpaper.eu/) API in the course of the academic year 2025/2026. [This version](https://github.com/EuropeanUniversityFoundation/occapi-openapi/issues/34) of the OCCAPI specification is being developed for this purpose, reflecting the findings shared by the universities that have deployed OCCAPI servers until this point in time.

    ## Comparison with other standards and specifications

    For a better understanding of existing data standards and API specifications, we suggest consulting the outputs of ongoing projects focused on course catalogues and digital interoperability, such as [DACEM](https://projects.uni-foundation.eu/dacem/) and [QualityLink](https://quality-link.eu/project-outputs/).

    ## Contributions

    We welcome contributions from the community at our [GitHub issue queue](https://github.com/EuropeanUniversityFoundation/occapi-openapi/issues).
servers:
  - url: /occapi/v2
    description: Sandbox server (example data)
tags:
  - name: API server
    description: Information about the server.
  - name: Institution
    description: Information about the Institutions covered by the server.
  - name: Organisational Unit
    description: Information about Organisational Units in an Institution.
  - name: Programme
    description: Information about Programmes offered by an Institution.
  - name: Course
    description: |
      Information about Courses offered by an Institution.

      _Course_ resources include a JSON:API _meta_ object containing information
       about the relation between each Course and specific Programmes.
  - name: Course instance
    description: |
      Information about instances of Courses offered by an Institution.

      _Course instance_ resources are directly linked to _Course_ resources.
