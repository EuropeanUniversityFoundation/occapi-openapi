                    $ref: '#/components/schemas/LanguageOfInstruction'
                  learningOutcomes:
                    type: array
                    minItems: 1
                    description: Learning outcomes with optional language code.
                    items:
                      $ref: '#/components/schemas/MultilineStringWithOptionalLang'
                  localClassification:
                    $ref: '#/components/schemas/LocalClassification'
                  restrictedToLocalStudents:
                    type: boolean
                    description: |
                      Return `true` when enrollment in the Course is restricted to students
                        enrolled at this Institution.
                  restrictedToAllianceStudents:
                    type: boolean
                    description: |
                      Return `true` when enrollment in the Course is restricted to students
                        enrolled at a partner Institution in the same University Alliance.
                  url:
                    type: array
                    description: External URL with optional language code.
                    items:
                      $ref: '#/components/schemas/HttpWithOptionalLang'
                  lastModified:
                    type: string
                    format: date-time
                    description: |
                      Time of latest change to this resource, formatted as
                       [_YYYY-MM-DDThh:mm:ssZ](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
              meta:
                $ref: '#/components/schemas/CourseMeta'
              relationships:
                $ref: '#/components/schemas/CourseRelationships'
              links:
                type: object
                description: JSON:API _links_ object.
                required:
                  - self
                properties:
                  self:
                    $ref: '#/components/schemas/LinksResource'
        links:
          type: object
          description: JSON:API _links_ object.
          properties:
            self:
              $ref: '#/components/schemas/LinksCollection'
