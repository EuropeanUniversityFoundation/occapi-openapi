<!DOCTYPE html>
<html>
  <head>
    <title>OCCAPI - Open Course Catalogue API</title>
    <!-- needed for adaptive design -->
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" rel="stylesheet">

    <!--
    Redoc doesn't change outer page styles
    -->
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #messages {
        margin: 0;
        padding: 0.25rem;
        text-align: center;
        font-family: sans-serif;
        background-color: #32329f;
        color: #fff;
      }
      #messages a {
        margin: 0.25rem;
        display: inline-block;
        padding: 0.25rem 0.5rem;
        border-radius: 0.5rem;
        color: #fff;
        text-decoration: none;
      }
      .stable {
        background-color: green;
      }
      .latest {
        background-color: darkred;
      }
    </style>
    <!-- Matomo -->
    <script>
      var _paq = window._paq = window._paq || [];
      /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
      _paq.push(['trackPageView']);
      _paq.push(['enableLinkTracking']);
      (function() {
        var u="//matomo.uni-foundation.eu/";
        _paq.push(['setTrackerUrl', u+'matomo.php']);
        _paq.push(['setSiteId', '1']);
        var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
        g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
      })();
    </script>
    <!-- End Matomo Code -->
  </head>
  <body>
  {% if has_stable or has_latest %}
    <div id="messages">Switch to &nbsp;
    {%- if has_stable -%}
      <a href="./{{ has_stable }}" class="stable">{{ has_stable }} (stable)</a>
    {%- endif -%}
    {% if has_stable and has_latest %} or {% endif %}
    {%- if has_latest -%}
      <a href="./{{ has_latest }}" class="latest">{{ has_latest }} (latest)</a>
    {%- endif -%}
    </div>
  {% endif %}
    <redoc spec-url="../{{ version }}/openapi.yaml"></redoc>
    <script src="https://cdn.jsdelivr.net/npm/redoc@latest/bundles/redoc.standalone.js"> </script>
  </body>
</html>
