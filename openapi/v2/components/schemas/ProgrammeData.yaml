type:
  type: string
  description: JSON:API resource type.
  enum: ['programme']
id:
  type: string
  description: JSON:API resource ID; UUID v4 is **recommended**,
   but any value that is unique within the realm of the Institution may be used.
  # format: uuid
attributes:
  type: object
  description: JSON:API _attributes_ object.
  required:
    - title
    - code
    - ects
    - eqfLevelProvided
  properties:
    title:
      type: array
      minItems: 1
      description: Title with optional language code.
      items:
        $ref: ./StringWithOptionalLang.yaml
    code:
      type: string
      minLength: 1
      description: Human readable code identifying the Programme.
    ects:
      type: integer
      minimum: 0
      description: Number of ECTS credits required to complete the Programme.
    eqfLevelProvided:
      type: integer
      minimum: 5
      maximum: 8
      description: |
        European Qualifications Framework (EQF) level provided to the learner
         upon completing the Programme.

        **Usage**

        - EQF level **5** for short cycle Programmes;
        - EQF level **6** for first cycle Programmes (i.e. Bachelor's degree);
        - EQF level **7** for short cycle Programmes (i.e. Master's degree);
        - EQF level **8** for short cycle Programmes (i.e. Doctorate).

        **References**

        [European Qualifications Framework - EU Vocabularies](https://op.europa.eu/en/web/eu-vocabularies/concept-scheme/-/resource?uri=http://data.europa.eu/snb/eqf/25831c2)
    abbreviation:
      type: array
      description: Abbbreviation with optional language code.
      items:
        $ref: ./StringWithOptionalLang.yaml
    description:
      type: array
      minItems: 1
      description: Description with optional language code.
      items:
        $ref: ./MultilineStringWithOptionalLang.yaml
    iscedCode:
      type: array
      minItems: 1
      description: |
        ISCED-F code describing the field of education of the Programme.

        Multiple values are allowed in order to support multidisplinary
          Programmes.

        **References**

        [Fields of education and training 2013](http://uis.unesco.org/sites/default/files/documents/international-standard-classification-of-education-fields-of-education-and-training-2013-detailed-field-descriptions-2015-en.pdf)
         (PDF)
      items:
        type: string
        minLength: 2
        maxLength: 4
    languageOfInstruction:
      type: array
      minItems: 1
      description: |
        IETF BCP 47 language tag.

        Language tags allow to specify languages and their variations on script,
         region, etc.

        **Usage**

        - `el` for Greek
        - `el-Latn` for Greek in Latin script.
        - `el-CY` for Cypriot Greek
        - `el-Latn-CY` for Cypriot Greek in Latin script.

        **References**

        - [Current specification](https://www.rfc-editor.org/info/bcp47)
        - [Language subtag registry](https://www.iana.org/assignments/language-subtag-registry/language-subtag-registry)
      items:
        type: string
        minLength: 2
    learningOutcomes:
      type: array
      minItems: 1
      description: Learning outcomes with optional language code.
      items:
        $ref: ./MultilineStringWithOptionalLang.yaml
    length:
      type: string
      pattern: '^\d{1,2}\/\d$'
      description: |
        Length of the Programme in **number of academic terms**.

        The first numeric component matching `\d{1,2}` indicates the total
         number of academic terms, while the second component matching `\d`
         indicates the fraction of a full academic year corresponding to a
         single academic term.

        **Usage**

        - `6/2` indicates six (6) semesters (1/2) equivalent to three full
         academic years;
        - `7/2` indicates seven (7) semesters (1/2) equivalent to three and a
         half academic years;
        - `9/3` indicates nine (9) trimesters (1/3) equivalent to three full
         academic years;
        - `3/1` indicates three (3) full years (1/1) absent a division in terms.
    url:
      type: array
      description: External URL with optional language code.
      items:
        $ref: ./HttpWithOptionalLang.yaml
    validSince:
      type: date
      description: |
        The first date in which the Programme was offered.

        **Usage**

        Dates must be formatted as _YYYY-MM-DD_.

        **References**

        [Internet Date/Time Format](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6)
    validUntil:
      type: date
      description: |
        The last date in which the Programme was offered.

        **Usage**

        Dates must be formatted as _YYYY-MM-DD_.

        **References**

        [Internet Date/Time Format](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6)
links:
  type: object
  description: JSON:API _links_ object.
  required:
    - self
  properties:
    self:
      $ref: ./LinksResource.yaml
    course:
      $ref: ./LinksCourseCollection.yaml
