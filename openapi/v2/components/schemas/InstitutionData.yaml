type:
  type: string
  description: JSON:API resource type.
id:
  type: string
  description: JSON:API resource ID; **must match** `heiId`.
  format: uuid
attributes:
  type: object
  description: JSON:API _attributes_ object.
  required:
    - title
    - heiId
    - lastModified
  properties:
    title:
      type: array
      minItems: 1
      description: Title with optional language code.
      items:
        $ref: ./StringWithOptionalLang.yaml
    heiId:
      type: string
      description: The SCHAC code of the Institution.
      format: hostname
    abbreviation:
      type: array
      description: Most widely recognized abbbreviation with optional language
       code.
      items:
        $ref: ./StringWithOptionalLang.yaml
    url:
      type: array
      description: External URL with optional language code.
      items:
        $ref: ./HttpWithOptionalLang.yaml
    lastModified:
      type: string
      format: date-time
      description: |
        Timestamp of the latest change to this resource, formatted as
        [_YYYY-MM-DDThh:mm:ssZ](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
links:
  type: object
  description: JSON:API _links_ object.
  required:
    - self
  properties:
    self:
      $ref: ./LinksResource.yaml
