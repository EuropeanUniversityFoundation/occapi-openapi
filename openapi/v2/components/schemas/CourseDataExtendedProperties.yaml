title:
  type: array
  minItems: 1
  description: Title with optional language code.
  items:
    $ref: ./fields/StringWithOptionalLang.yaml
code:
  type: string
  minItems: 1
  description: Human readable code identifying the Course.
ects:
  type: integer
  minimum: 0
  description: |
    Number of ECTS credits awarded to the learner upon completing the Course.
academicTerm:
  type: array
  description: |
    Academic term in which the Course is delivered.

    Multiple values are allowed in order to support Courses delivered in
      in more than one academic term throughout an academic year.

    **Usage**

    - `1/2` indicates first (1) semester (1/2);
    - `2/3` indicates second (2) trimester (1/3);
    - `1/1` indicates full academic year.
  items:
    type: string
    pattern: '^[1-9]\/[1/9]$'
description:
  type: array
  minItems: 1
  description: Description with optional language code.
  items:
    $ref: ./fields/MultilineStringWithOptionalLang.yaml
elmAssessmentType:
  $ref: ./fields/ElmAssessmentType.yaml
elmLearningActivityType:
  $ref: ./fields/ElmLearningActivityType.yaml
elmLearningOpportunityType:
  $ref: ./fields/ElmLearningOpportunityTypeCourse.yaml
elmModeOfLearning:
  $ref: ./fields/ElmModeOfLearningAndAssessment.yaml
iscedCode:
  type: array
  description: |
    ISCED-F code describing the field of education of the Course.

    Multiple values are allowed in order to support multidisplinary
      Courses.

    **References**

    [Fields of education and training 2013](http://uis.unesco.org/sites/default/files/documents/international-standard-classification-of-education-fields-of-education-and-training-2013-detailed-field-descriptions-2015-en.pdf)
      (PDF)
  items:
    type: string
    minLength: 2
    maxLength: 4
languageOfInstruction:
  $ref: ./fields/LanguageOfInstruction.yaml
learningOutcomes:
  type: array
  minItems: 1
  description: Learning outcomes with optional language code.
  items:
    $ref: ./fields/MultilineStringWithOptionalLang.yaml
localClassification:
  $ref: ./fields/LocalClassification.yaml
restrictedToLocalStudents:
  type: boolean
  description: |
    Return `true` when enrollment in the Course is restricted to students
     enrolled at this Institution.
restrictedToAllianceStudents:
  type: boolean
  description: |
    Return `true` when enrollment in the Course is restricted to students
     enrolled at a partner Institution in the same University Alliance.
url:
  type: array
  description: External URL with optional language code.
  items:
    $ref: ./fields/HttpWithOptionalLang.yaml
bibliography:
  type: array
  description: Bibliography with optional language code.
  items:
    $ref: ./fields/MultilineStringWithOptionalLang.yaml
courseContent:
  type: array
  description: Course content with optional language code.
  items:
    $ref: ./fields/MultilineStringWithOptionalLang.yaml
prerequisites:
  type: array
  description: Prerequisites with optional language code.
  items:
    $ref: ./fields/MultilineStringWithOptionalLang.yaml
courseAvailability:
  type: array
  description: Course availability with optional language code.
  items:
    $ref: ./fields/MultilineStringWithOptionalLang.yaml
teachingMethod:
  type: array
  description: |
    Teaching method with optional language code.

    **Note:** It is preferable to use `elmLearningActivityType` instead.
  items:
    $ref: ./fields/MultilineStringWithOptionalLang.yaml
assessmentMethod:
  type: array
  description: |
    Assessment method with optional language code.

    **Note:** It is preferable to use `elmAssessmentType` instead.
  items:
    $ref: ./fields/MultilineStringWithOptionalLang.yaml
lastModified:
  type: string
  format: date-time
  description: |
    Time of latest change to this resource, formatted as
     [YYYY-MM-DDThh:mm:ssZ](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
deprecated:
  type: boolean
  description: |
    Return `true` if a Course will no longer be delivered, or there is no
     expectation that it will be delivered in the foreseeable future.

    **Deprecate, do not delete!**

    Institutions **must** keep a permanent record of all Courses ever delivered
     so that they may be dereferenced from _Course instances_.

    Servers **must** omit deprecated Courses from Course collections (unless
     `deprecated` is used as a filter).

    Servers **must** provide deprecated Course data via its **canonical path**.
