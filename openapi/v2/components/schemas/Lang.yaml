description: |
  IETF BCP 47 language tag.

  Language tags allow to specify languages and their variations on script, region, etc.

  **Usage**

  - `el` for Greek
  - `el-Latn` for Greek in Latin script.
  - `el-CY` for Cypriot Greek
  - `el-Latn-CY` for Cypriot Greek in Latin script.

  **References**

  - [Current specification](https://www.rfc-editor.org/info/bcp47)
  - [Language subtag registry](https://www.iana.org/assignments/language-subtag-registry/language-subtag-registry)
