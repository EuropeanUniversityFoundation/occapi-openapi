type: object
description: |
  JSON:API _relationships_ object.
properties:
  prerequisiteCourse:
    type: array
    description: |
      List of other Courses that **must** be completed before enrollment in the
       present Course is allowed.

      If the prerequisites for the present Course cannot be matched to concrete
       Courses, use the `prerequisites` data attribute for a more detailed
       description.
    items:
      type: object
      required:
        - data
        - links
      properties:
        data:
          type: object
          description: Related _Course_ data.
          required:
            - type
            - id
          properties:
            type:
              type: string
              description: JSON:API resource type.
              enum: ['course']
            id:
              type: string
              description: JSON:API resource ID; UUID v4 is **recommended**, but
               any value that is unique within the Institution may be used.
              # format: uuid
        links:
          type: object
          description: JSON:API _links_ object.
          required:
            - self
          properties:
            self:
              $ref: ./LinksResource.yaml
