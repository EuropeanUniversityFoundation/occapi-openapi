type:
  type: string
  description: JSON:API resource type.
  enum: ['ounit']
id:
  type: string
  description: JSON:API resource ID; UUID v4 is **recommended**,
   but any string that is unique within the realm of the Institution may be used.
  format: uuid
attributes:
  type: object
  description: JSON:API _attributes_ object.
  required:
    - title
    - ounitId
    - lastModified
  properties:
    title:
      type: array
      description: Title with optional language code.
      items:
        $ref: ./StringWithOptionalLang.yaml
    ounitId:
      type: string
      description: Unique identifier within the Institution. Can be a UUID.
    abbreviation:
      type: array
      description: Most widely recognized abbbreviation with optional language
       code.
      items:
        $ref: ./StringWithOptionalLang.yaml
    ounitCode:
      type: string
      description: Human readable code identifying the Organisational Unit.
    url:
      type: array
      description: External URL with optional language code.
      items:
        $ref: ./HttpWithOptionalLang.yaml
    lastModified:
      type: string
      format: date-time
      description: |
        Time of latest change to this resource, formatted as
        [_YYYY-MM-DDThh:mm:ssZ](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
links:
  type: object
  description: JSON:API _links_ object.
  required:
    - self
  properties:
    self:
      $ref: ./LinksResource.yaml
    programme:
      $ref: ./LinksProgrammeCollection.yaml
    course:
      $ref: ./LinksCourseCollection.yaml
