type: object
description: |
  _Optional. Describes a histogram of results achieved by all the students of
   this course instance (including the ones who have failed the course). Note
   that labels of the histogram are not integers, e.g. they may contain ranges
   (like "10-20", or "more than 150")._
properties:
  category:
    type: array
    minItems: 1
    items:
      $ref: ./fields/ResultDistributionCategory.yaml
  description:
    type: array
    description: |
      Additional description of the histogram with optional language code.
    items:
      $ref: ./fields/MultilineStringWithOptionalLang.yaml
