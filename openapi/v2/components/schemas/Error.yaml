type: object
required:
  - errors
properties:
  jsonapi:
    $ref: ./links/Jsonapi.yaml
  errors:
    type: array
    description: |
      From the JSON:API specification:
       _Error objects provide additional information about problems encountered
       while performing an operation. Error objects MUST be returned as an array
       keyed by errors in the top level of a JSON:API document._

      [Read more](https://jsonapi.org/format/#errors)
    items:
      type: object
      description: JSON:API `error` object.
      properties:
        id:
          type: string
          description: |
            _A unique identifier for this particular occurrence of the problem._
        links:
          type: object
          properties:
            about:
              type: string
              description: |
                _A link that leads to further details about this particular
                 occurrence of the problem. When dereferenced, this URI SHOULD
                 return a human-readable description of the error._
        status:
          type: string
          description: |
            _The HTTP status code applicable to this problem, expressed as a
             string value. This SHOULD be provided._
        code:
          type: string
          description: |
            _An application-specific error code, expressed as a string value._
        title:
          type: string
          description: |
            _A short, human-readable summary of the problem that SHOULD NOT
             change from occurrence to occurrence of the problem, except for
             purposes of localization._
        detail:
          type: object
          description: |
            _A human-readable explanation specific to this occurrence of the
             problem. Like `title`, this field’s value can be localized.
        source:
          type: object
          description: |
            _An object containing references to the primary source of the
             error. It SHOULD include one of the following members or be
             omitted:_
          properties:
            pointer:
              type: string
              description: |
                _A JSON Pointer [RFC6901](https://tools.ietf.org/html/rfc6901)
                 to the value in the request document that caused the error
                 [e.g. `"/data"` for a primary data object, or
                 `"/data/attributes/title"` for a specific attribute]. This
                 MUST point to a value in the request document that exists; if
                 it doesn’t, the client SHOULD simply ignore the pointer._
            parameter:
              type: string
              description: |
                _A string indicating which URI query parameter caused the
                 error._
            meta: 
              type: string
              description: |
                _A meta object containing non-standard meta-information about
                 the error._
