startDate:
  type: string
  format: date
  description: |
    The first date in which the Course instance was offered, formatted as
    [YYYY-MM-DD](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
endDate:
  type: string
  format: date
  description: |
    The last date in which the Course instance was offered, formatted as
    [YYYY-MM-DD](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
academicTermId:
  $ref: ./fields/AcademicTermId.yaml
ects:
  type: float
  minimum: 0
  description: |
    Number of ECTS credits awarded to the learner upon completing the Course.
elmAssessmentType:
  $ref: ./fields/ElmAssessmentType.yaml
elmLearningActivityType:
  $ref: ./fields/ElmLearningActivityType.yaml
elmLearningOpportunityType:
  $ref: ./fields/ElmLearningOpportunityTypeCourse.yaml
elmModeOfLearning:
  $ref: ./fields/ElmModeOfLearningAndAssessment.yaml
engagementHours:
  type: float
  description: Total number of engagement hours during the entire Instance.
languageOfInstruction:
  $ref: ./fields/LanguageOfInstruction.yaml
lastModified:
  type: string
  format: date-time
  description: |
    Time of latest change to this resource, formatted as
    [YYYY-MM-DDThh:mm:ssZ](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6).
