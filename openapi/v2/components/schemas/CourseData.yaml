type:
  type: string
  description: JSON:API resource type.
  enum: ['course']
id:
  type: string
  description: JSON:API resource ID; UUID v4 is **recommended**,
   but any value that is unique within the realm of the Institution may be used.
  # format: uuid
attributes:
  type: object
  description: JSON:API _attributes_ object.
  required:
    - title
    - code
    - ects
    - lastModified
  properties:
    $ref: ./CourseDataProperties.yaml
meta:
  $ref: ./CourseMeta.yaml
links:
  type: object
  description: JSON:API _links_ object.
  required:
    - self
  properties:
    self:
      $ref: ./LinksResource.yaml
