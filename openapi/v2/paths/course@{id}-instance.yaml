get:
  tags:
    - Course instance
  summary: GET /hei/{heiId}/course/{id}/instance
  description: |
    This endpoint lists all _Course instances_ filtered by _Course_.
  operationId: getCourseInstances
  parameters:
    - name: heiId
      in: path
      description: The SCHAC code of the Institution.
      required: true
      schema:
        type: string
    - name: id
      in: path
      description: The UUID of the _Course_ resource to filter by.
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: OK
      headers:
        Content-Type:
          description: HTTP Content-Type representation header.
          schema:
            type: string
            enum: ['application/vnd.api+json']
      content:
        application/vnd.api+json:
          schema:
            $ref: ../components/schemas/CourseInstanceCollection.yaml
          example:
            $ref: ../components/responses/CourseInstanceCollection.yaml
    '404':
      description: Endpoint not available.
      content:
        application/vnd.api+json:
          schema:
            $ref: ../components/schemas/Error.yaml
          example:
            $ref: ../components/responses/EndpointNotAvailable.yaml
