get:
  tags:
    - Course instance
  summary: GET /hei/{heiId}/instance/{id}
  description: |
    This endpoint exposes information about a _Course instance_.
  operationId: getCourseInstanceByUuid
  parameters:
    - name: heiId
      in: path
      description: The SCHAC code of the Institution.
      required: true
      schema:
        type: string
        format: hostname
    - name: id
      in: path
      description: The UUID of the _Course instance_ resource.
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: OK
      headers:
        Content-Type:
          description: HTTP Content-Type representation header.
          schema:
            type: string
            enum: ['application/vnd.api+json']
      content:
        application/vnd.api+json:
          schema:
            $ref: ../components/schemas/CourseInstanceResource.yaml
          example:
            $ref: ../components/responses/CourseInstanceResource.yaml
    '404':
      description: Resource not found.
      content:
        application/vnd.api+json:
          schema:
            $ref: ../components/schemas/Error.yaml
          example:
            $ref: ../components/responses/ResourceNotFound.yaml
